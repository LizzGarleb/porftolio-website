<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Code by Red</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1E1E1E;
            color: #F5F0E8;
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Matrix canvas */
        canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.18;
        }

        /* Content */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px 30px;
            max-width: 600px;
        }

        .system-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            letter-spacing: 4px;
            color: #C9A84C;
            margin-bottom: 20px;
        }

        /* Glitch 404 */
        .glitch {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(72px, 15vw, 120px);
            font-weight: 700;
            color: #C41E3A;
            position: relative;
            display: inline-block;
            line-height: 1;
            margin-bottom: 20px;
        }

        .glitch::before,
        .glitch::after {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .glitch::before {
            color: #C9A84C;
            animation: glitch-top 3s infinite;
            clip-path: polygon(0 0, 100% 0, 100% 38%, 0 38%);
        }

        .glitch::after {
            color: #F5F0E8;
            animation: glitch-bottom 3s infinite;
            clip-path: polygon(0 62%, 100% 62%, 100% 100%, 0 100%);
        }

        @keyframes glitch {
            0%, 88%, 100% { transform: translate(0); }
            90% { transform: translate(-3px, 1px); }
            92% { transform: translate(3px, -1px); }
            94% { transform: translate(-2px, 2px); }
            96% { transform: translate(2px, -2px); }
        }

        @keyframes glitch-top {
            0%, 88%, 100% { transform: translate(0); }
            90% { transform: translate(4px, 0); }
            92% { transform: translate(-4px, 0); }
            94% { transform: translate(2px, 0); }
        }

        @keyframes glitch-bottom {
            0%, 88%, 100% { transform: translate(0); }
            90% { transform: translate(-4px, 0); }
            92% { transform: translate(4px, 0); }
            94% { transform: translate(-2px, 0); }
        }

        /* Strikethrough glitch for option C */
        .glitch-strike {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(72px, 15vw, 120px);
            font-weight: 700;
            color: #C41E3A;
            position: relative;
            display: inline-block;
            line-height: 1;
            margin-bottom: 20px;
            text-decoration: line-through;
            text-decoration-color: #C9A84C;
            text-decoration-thickness: 4px;
            animation: glitch 3s infinite;
        }

        /* Minimal style for option D */
        .glitch-cold {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(80px, 18vw, 140px);
            font-weight: 700;
            color: #F5F0E8;
            display: inline-block;
            line-height: 1;
            margin-bottom: 20px;
            letter-spacing: -4px;
        }

        .gold-line {
            width: 50px;
            height: 2px;
            background: #C9A84C;
            margin: 0 auto 20px;
            border-radius: 2px;
        }

        .error-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(14px, 3vw, 18px);
            color: #F5F0E8;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .error-sub {
            font-family: 'Share Tech Mono', monospace;
            font-size: clamp(12px, 2vw, 15px);
            color: #888;
            line-height: 1.8;
            margin-bottom: 36px;
        }

        .error-sub .highlight { color: #C41E3A; }
        .error-sub .gold { color: #C9A84C; }

        .btn {
            display: inline-block;
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            padding: 12px 32px;
            border: 1px solid #C9A84C;
            color: #C9A84C;
            border-radius: 99px;
            text-decoration: none;
            letter-spacing: 2px;
            transition: background 0.2s, color 0.2s;
            cursor: pointer;
        }

        .btn:hover {
            background: #C9A84C;
            color: #0a0a0a;
        }

        .logo {
            position: fixed;
            top: 20px;
            left: 24px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: #C9A84C;
            text-decoration: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <a href="index.html" class="logo">Code by Red</a>
    <canvas id="matrix"></canvas>

    <div class="container" id="content"></div>

    <script>
        // Matrix rain
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        const fontSize = 14;
        const columns = Math.floor(canvas.width / fontSize);
        const drops = Array(columns).fill(1);

        function drawMatrix(color) {
            ctx.fillStyle = 'rgba(30, 30, 30, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = color;
            ctx.font = fontSize + "px 'Share Tech Mono', monospace";
            drops.forEach((y, i) => {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.95) drops[i] = 0;
                drops[i]++;
            });
        }

        // 4 variations
        const variations = [
            // Option A — Terminal Error
            {
                color: '#C41E3A',
                html: `
                    <div class="system-label">[ ERROR 404 ]</div>
                    <div class="glitch" style="animation: glitch 3s infinite;">404</div>
                    <div class="gold-line"></div>
                    <div class="error-title">ACCESS DENIED</div>
                    <div class="error-sub">
                        Nothing to see here.<br>
                        <span class="highlight">Access denied.</span> Page not found.
                    </div>
                    <a href="index.html" class="btn">&gt; Return to base_</a>
                `
            },
            // Option B — Hacker Flavour
            {
                color: '#C41E3A',
                html: `
                    <div class="system-label">[ SYSTEM ERROR ]</div>
                    <div class="glitch" style="animation: glitch 3s infinite;">404</div>
                    <div class="gold-line"></div>
                    <div class="error-title">FILE NOT FOUND</div>
                    <div class="error-sub">
                        You've wandered into the void.<br>
                        Even <span class="highlight">big sister</span> can't find this page.
                    </div>
                    <a href="index.html" class="btn">&gt; Go back home_</a>
                `
            },
            // Option C — Glitched Identity
            {
                color: '#C9A84C',
                html: `
                    <div class="system-label">[ IDENTITY ERROR ]</div>
                    <div class="glitch-strike">404</div>
                    <div class="gold-line"></div>
                    <div class="error-title">PAGE WIPED</div>
                    <div class="error-sub">
                        This page has been wiped.<br>
                        <span class="gold">Nice try. — Red</span>
                    </div>
                    <a href="index.html" class="btn">&gt; Return home_</a>
                `
            },
            // Option D — Minimal and Cold
            {
                color: '#888',
                html: `
                    <div class="system-label">[ 404 ]</div>
                    <div class="glitch-cold">404</div>
                    <div class="gold-line"></div>
                    <div class="error-sub">
                        You weren't supposed to be here.
                    </div>
                    <a href="index.html" class="btn">&gt; Escape_</a>
                `
            }
        ];

        // Pick random variation on load
        const pick = variations[Math.floor(Math.random() * variations.length)];
        document.getElementById('content').innerHTML = pick.html;
        setInterval(() => drawMatrix(pick.color), 33);
    </script>

</body>
</html>
